<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Тренажёр 1С:Профессионал — Платформа 8.3</title>
<style>
:root{--y:#ffd400;--r:#d6001c;--dark:#8a0012;--bg:#fffdf4;}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:#222}
header{background:linear-gradient(90deg,var(--r),var(--dark));color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header .logo{background:var(--y);color:var(--r);font-weight:800;border-radius:8px;padding:4px 10px;font-size:20px}
header h1{font-size:17px;margin:0;flex:1;min-width:200px}
#timer{font-size:20px;font-weight:700;background:#fff2;padding:4px 12px;border-radius:8px;display:none}
#timer.warn{background:var(--y);color:var(--r)}
main{max-width:860px;margin:0 auto;padding:16px}
.card{background:#fff;border:1px solid #eee;border-radius:12px;box-shadow:0 2px 8px #0001;padding:18px;margin-bottom:16px}
button{cursor:pointer;border:none;border-radius:8px;padding:10px 18px;font-size:15px;font-weight:600}
.btn-r{background:var(--r);color:#fff}.btn-y{background:var(--y);color:#5a2a00}
.btn-g{background:#eee;color:#333}
button:disabled{opacity:.5;cursor:default}
.menu button{display:block;width:100%;margin:8px 0;padding:14px;font-size:16px}
select{padding:8px;border-radius:8px;border:1px solid #ccc;font-size:15px;max-width:100%}
.qtext{font-size:17px;line-height:1.45;margin-bottom:14px;font-weight:600}
.qmeta{font-size:13px;color:#888;margin-bottom:6px}
.opt{display:flex;gap:10px;align-items:flex-start;border:2px solid #e6e6e6;border-radius:10px;padding:12px;margin:8px 0;cursor:pointer;transition:.15s;font-size:15px;line-height:1.4}
.opt:hover{border-color:var(--y);background:#fffbe6}
.opt input{margin-top:3px;accent-color:var(--r)}
.opt.correct{border-color:#1a9c3e;background:#e8f8ec}
.opt.wrong{border-color:var(--r);background:#fdeaea}
.opt.locked{cursor:default;pointer-events:none}
.opt.dim{opacity:.65}
.bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px}
.stat{font-size:14px;color:#555}
.badge{display:inline-block;background:var(--y);color:#6b3d00;border-radius:6px;padding:1px 7px;font-size:12px;font-weight:700;margin-left:6px}
.result{text-align:center;padding:30px}
.result .big{font-size:34px;font-weight:800;margin:10px 0}
.pass{color:#1a9c3e}.fail{color:var(--r)}
.dots{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}
.dot.click{cursor:pointer}
.dot{width:22px;height:22px;border-radius:50%;background:#ddd;font-size:12px;display:flex;align-items:center;justify-content:center;color:#555}
.dot.ok{background:#1a9c3e;color:#fff}.dot.bad{background:var(--r);color:#fff}.dot.cur{outline:3px solid var(--y)}
.fuzzy{color:#b06f00;font-size:12px}
footer{color:#999;font-size:12px;text-align:center;padding:16px}
@media(max-width:520px){.qtext{font-size:16px}header h1{font-size:14px}}
</style>
</head>
<body>
<header>
 <div class="logo">1С</div>
 <h1>Тренажёр «1С:Профессионал» — Платформа 8.3 (изд. 2021)</h1>
 <div id="timer">30:00</div>
</header>
<main>
<div id="menu" class="card menu">
 <p><b>Банк:</b> <span id="bankInfo"></span></p>
 <button class="btn-r" onclick="startExam()">🎓 Экзамен: 14 вопросов, 30 минут, зачёт от 12</button>
 <div style="margin:14px 0 6px;font-weight:700">📚 Режим «Учить»</div>
 <select id="secSel"></select>
 <label style="font-size:14px;margin-left:8px"><input type="checkbox" id="shuf" checked> вперемешку</label>
 <button class="btn-y" style="margin-top:10px" onclick="startLearn()">Начать обучение</button>
</div>

<div id="quiz" class="card" style="display:none">
 <div class="dots" id="dots"></div>
 <div class="qmeta" id="qmeta"></div>
 <div class="qtext" id="qtext"></div>
 <div id="opts"></div>
 <div id="refbox" style="display:none;margin-top:12px;background:#fffbe6;border-left:5px solid var(--y);border-radius:8px;padding:12px;font-size:14px;line-height:1.5"></div>
 <div class="bar">
  <button class="btn-g" id="prevBtn" style="display:none" onclick="prev()">← Назад</button>
  <button class="btn-r" id="answerBtn" style="display:none" onclick="commitMulti()">Ответить</button>
  <button class="btn-g" id="refBtn" style="display:none" onclick="toggleRef()">💡 Справка</button>
  <button class="btn-y" id="nextBtn" style="display:none" onclick="next()">Дальше →</button>
  <button class="btn-g" onclick="toMenu()">В меню</button>
  <span class="stat" id="score"></span>
 </div>
</div>

<div id="resultCard" class="card result" style="display:none">
 <div id="resTitle" class="big"></div>
 <div id="resInfo" style="font-size:17px;margin-bottom:20px"></div>
 <button class="btn-r" onclick="startExam()">Новый билет</button>
 <button class="btn-g" onclick="toMenu()">В меню</button>
</div>
</main>
<footer>Локальный тренажёр для личной подготовки. Вопросы с пометкой «~» сверены с ключом автоматически — при сомнении проверьте по книге.</footer>

гию документа задаёт пара «Дата» + «Ссылка»: у документов с одинаковой датой-временем порядок определяется ссылкой. Вместе это момент времени."}, {"sec": 7, "q": "Как изменится количество записей в результате запроса при использовании секции \"ИТОГИ ПО\"?", "opts": ["Количество записей увеличится (по сравнению с их количеством без секции \"ИТОГИ ПО\")", "Количество записей останется неизменным (по сравнению с их количеством без секции \" ИТОГИ ПО\")", "Количество записей уменьшится (по сравнению с их количеством без секции \"ИТОГИ ПО\")"], "correct": [0], "fuzzy": false, "e": "ИТОГИ ПО добавляет к детальным записям ещё и итоговые строки по группировкам — записей становится БОЛЬШЕ, а не меньше. Не путай со СГРУППИРОВАТЬ ПО (там меньше)."}, {"sec": 7, "q": "Какие из следующих утверждений верны?", "opts": ["Конструктор запросов входит в состав конструктора схемы компоновки данных", "Конструктор схемы компоновки данных входит в состав конструктора запросов", "Конструктор схемы компоновки данных всегда использует конструктор запросов", "Варианты 1 и 2", "Варианты 2 и 3", "Варианты 1 и 3"], "correct": [5], "fuzzy": true, "e": "Конструктор выходной формы может использовать построитель отчётов, а конструктор запросов входит в его состав — верна пара утверждений о вложенности инструментов."}, {"sec": 7, "q": "Каким из вышеперечисленных способов можно воспользоваться, чтобы в разделе \"Поля\" конструктора запросов появились код и наименование справочника?", "opts": ["Сначала заполнить раздел \"Таблицы\", а потом, выбирая нужные объекты из этого раздела, перенести их в раздел \"Поля\", используя двойной клик левой клавиши мыши", "Не заполняя раздел \"Таблицы\", сразу выбирать нужные объекты из таблиц - источников данных раздела \"База данных\", перенося их в раздел \"Поля\", используя технологию Drag & Drop. Раздел \"Таблицы\" заполняется автоматически", "Сначала заполнить раздел \"Таблицы\", а потом, выбирая нужные объекты из этого раздела, перенести их в раздел \"Поля\", используя кнопки на форме \">\", \">>\"", "Верны ответы 1 и 3", "Верны ответы 1, 2 и 3"], "correct": [4], "fuzzy": false, "e": "Заполнить «Поля» можно всеми способами: перенести из «Таблиц» двойным кликом, кнопками формы или сразу тащить объекты из раздела «База данных» (Drag&Drop) — «Таблицы» заполнятся сами."}, {"sec": 7, "q": "Какими скобками выделяются расширения языка запросов, предназначенные схемы компоновки данных?", "opts": ["Квадратные скобки – []", "Фигурные - {}", "Круглые - ()", "Не выделяются"], "correct": [1], "fuzzy": true, "e": "Расширения языка запросов для СКД (и построителя) пишутся в фигурных скобках {…} — эти куски обрабатывает компоновка, а не СУБД."}, {"sec": 7, "q": "Левое внешнее соединение означает, что в результат соединения войдут:", "opts": ["Все данные из таблицы №2 и они будут дополнены данными из таблицы №1, для которых выполняется условие соединения", "Данные из обеих таблиц, для которых выполняется условие соединения, но поля, которые берутся из таблицы №1, будут идти первыми (слева)", "Все данные из таблицы №1 и они будут дополнены данными из таблицы №2, для которых выполняется условие соединения"], "correct": [2], "fuzzy": false, "e": "ЛЕВОЕ СОЕДИНЕНИЕ: все записи левой таблицы (№1) + подходящие по условию из правой (№2); где пары нет — NULL. Правое — зеркально."}, {"sec": 7, "q": "Можно ли при выборе таблицы-источника в раздел \"Таблицы\" конструктора запросов задавать для нее новое имя (псевдоним)?", "opts": ["Да, можно", "Да, можно, но только если в качестве источника данных выступает вложенный запрос", "Да, можно, но только если в качестве источника данных выступает виртуальная таблица", "Верны ответы 1 и 2", "Верны ответы 1 и 3"], "correct": [0], "fuzzy": false, "e": "Псевдоним таблицы-источника задать можно (переименовать прямо в разделе «Таблицы») — удобно при самосоединениях."}, {"sec": 7, "q": "Можно ли установить флаг \"Автоупорядочивание\" на закладке \"Порядок\" конструктора запросов, если на этой закладке не заданы настройки?", "opts": ["Можно, записи в результирующей таблице запроса будут упорядочены по полям сортировки по умолчанию для таблиц-источников данных", "Можно, если заданы настройки на станицах \"Группировка\" или \"Итоги\". Порядок записей в результирующей таблице запроса будет определяться этими настройками", "Верны ответы 1 и 2", "Нельзя", "Можно, но никакого упорядочивания не будет"], "correct": [2], "fuzzy": false, "e": "«Автоупорядочивание» без явных настроек порядка ставить можно: сортировка возьмётся из настроек «Группировки»/«Итогов», а если и их нет — по полям сортировки по умолчанию таблиц-источников."}, {"sec": 7, "q": "Можно ли, используя конструктор запроса, повлиять на порядок записей в результирующей таблице запроса?", "opts": ["Нельзя", "Это можно сделать на закладке \"Порядок\"", "Это можно сделать на закладке \"Объединения/Псевдонимы\"", "Верны ответы 2 и 3"], "correct": [2], "fuzzy": false, "e": "На порядок записей влияют две закладки: «Порядок» (явная сортировка) и «Объединения/Псевдонимы» (порядок объединяемых запросов). Внимательно читай, какой вариант в билете."}, {"sec": 7, "q": "Можно ли, используя конструктор запроса, получить итоги по иерархии?", "opts": ["Можно, если для итогового группировочного поля указать тип итогов \"Элементы и иерархия\"", "Можно, если для итогового группировочного поля указать тип итогов \"Только иерархия\"", "Можно, если для итогового группировочного поля указать тип итогов \"Элементы\"", "Можно, при этом ничего делать не нужно итоги по иерархии получаются системой автоматически", "Варианты 1 и 2", "Варианты 1 и 2 и 3"], "correct": [0], "fuzzy": false, "e": "Итоги по иерархии — тип итога «Элементы и иерархия» или «Только иерархия» у группировочного поля на закладке «Итоги»."}, {"sec": 7, "q": "На закладке \"Объединения/Псевдонимы\" конструктора запросов можно:", "opts": ["Задать список запросов. В результирующую выборку попадут записи всех указанных запросов", "Задать имена полей результирующей таблицы", "Задать имена таблиц-источников данных", "Верны ответы 1 и 2", "Верны ответы 1, 2 и 3"], "correct": [0], "fuzzy": false, "e": "«Объединения/Псевдонимы»: список объединяемых запросов (все записи попадут в выборку) и имена (псевдонимы) полей результирующей таблицы."}, {"sec": 7, "q": "На закладке \"Связи\" конструктора запросов можно определить:", "opts": ["Соединение таблиц-источников данных и связи между ними", "Объединение таблиц-источников данных и связи между ними", "Связи между полями таблицы, получаемой в результате выполнения запроса", "Связи между полями таблицы-источника данных и таблицы, получаемой в результате выполнения запроса"], "correct": [0], "fuzzy": false, "e": "«Связи» — это соединения таблиц-источников и условия связи между ними (внутреннее/левое/правое/полное)."}, {"sec": 7, "q": "На закладке \"Условия\" конструктора запросов отдельная строка списка условий может быть сформирована:", "opts": ["С помощью двойного клика левой клавишей мыши на нужном поле в списке доступных полей", "Путем переноса нужного поля в список, используя технологию Drag & Drop", "Нажать кнопку \"Добавить\". Если условие произвольное, то текст условия можно ввести \"вручную\"", "Вызвав контекстное меню, выбрать в нем пункт \"Добавить\". Возможно использование произвольного выражения", "Верны все вышеперечисленные ответы"], "correct": [4], "fuzzy": false, "e": "Условие добавляется любым способом: двойной клик по полю, Drag&Drop, кнопка «Добавить», контекстное меню — включая произвольные условия, набранные вручную."}, {"sec": 7, "q": "Отразятся ли настройки, сделанные в разделе \"Объединения/Псевдонимы\" конструктора запросов, на информацию, отображаемую в других разделах конструктора?", "opts": ["Нет, вид остальных разделов конструктора запросов остается без изменений", "Да, в конструкторе запросов появляется закладка \"Связи\"", "Да. Если заданы псевдонимы полей результирующей таблицы, то новые названия появляются на закладке \"Порядок\" в списке полей", "Да. При объединении запросов на ряде закладок (в том числе \"Таблицы и поля\") появляется возможность переключения между объединяемыми запросами", "Верны ответы 2 и 3", "Верны ответы 3 и 4"], "correct": [5], "fuzzy": false, "e": "Да, отражаются: псевдонимы полей появляются на закладке «Порядок», а при объединении на ряде закладок («Таблицы и поля» и др.) появляется переключение между запросами."}, {"sec": 7, "q": "При настройке ограничения доступа к данным в качестве значений, по которым производится ограничения доступа к данным, могут использоваться:", "opts": ["Значения параметров сеанса", "Данные из таблиц (запросов)", "Значения имеющие типы: Число, Строка, Булево, Дата", "Варианты 1 и 2", "Варианты 1 и 3", "Варианты 1 и 2 и 3"], "correct": [1], "fuzzy": false, "e": "Значениями для RLS служат параметры сеанса и данные из таблиц (запросов). В этой редакции вопроса верный акцент — «данные из таблиц»; сверяй варианты билета."}, {"sec": 7, "q": "При настройке ограничения доступа к данным допускается установка нескольких (по числу полей) ограничений:", "opts": ["Для права \"Чтение\"", "Для права \"Изменение\"", "Для права \"Добавление\"", "Для права \"Удаление\"", "Для всех вышеперечисленных прав", "Для всех возможных прав"], "correct": [0], "fuzzy": false, "e": "Несколько ограничений (по числу полей) допускается только для права «Чтение». Для Добавления/Изменения/Удаления — одно ограничение на всю запись."}, {"sec": 7, "q": "При объединении двух запросов на закладке \"Объединения/Псевдонимы\" конструктора запросов условие связи между запросами:", "opts": ["Должно быть задано обязательно", "Может быть задано, если этого требует логика построения всего запроса", "Условие связи между запросами задать нельзя"], "correct": [2], "fuzzy": false, "e": "Между объединяемыми запросами условия связи НЕ бывает: ОБЪЕДИНИТЬ просто складывает наборы записей. Условия связи — это про соединения таблиц, не про объединения."}, {"sec": 7, "q": "При описании группировки в тексте запроса:", "opts": ["Все поля должны делиться на те, по которым производится группировка, и на агрегатные функции (рассчитываемые поля)", "Все поля должны делиться на те, по которым производится группировка, на агрегатные функции (рассчитываемые поля) и на поля вложенных таблиц", "Чем выше определяется группировка, тем выше должно определяться поле в запросе", "Перечисленные ограничения не действуют"], "correct": [1], "fuzzy": false, "e": "Правило СГРУППИРОВАТЬ ПО: каждое поле выборки — либо группировочное, либо агрегатная функция, либо поле вложенной таблицы. «Свободных» полей быть не может."}, {"sec": 7, "q": "При определении в виртуальной таблице \"ОстаткиИОбороты\" варианта периодичности \"Авто\":", "opts": ["система автоматически подберет периодичность получения оборотов исходя из правила: чтобы в результате оказалось не менее 3-х значений периодов, но не более 12", "система автоматически подберет периодичность получения оборотов исходя из правила: чтобы в результате оказалось не менее 5-ти значений периодов, но не более 10", "в полях выборки запроса разработчик сможет выбирать поля периода с разной периодичностью"], "correct": [2], "fuzzy": false, "e": "Периодичность «Авто» у ОстаткиИОбороты открывает в полях запроса всю линейку периодов (Регистратор, День, Месяц, Квартал…) — выбирай нужную детализацию прямо в полях."}, {"sec": 7, "q": "При попытке выполнить запрос с текстом \"Выбрать * Из Справочник.Номенклатура\", в случае если на записи справочника были определены ограничения на чтение (в соответствующей роли) произойдет следующее:", "opts": ["Будут получены все данные", "Будут получены данные только из разрешенных записей", "Произойдет ошибка"], "correct": [2], "fuzzy": false, "e": "ВЫБРАТЬ * при настроенном RLS на чтение → ошибка выполнения: запрос пытается прочитать ВСЕ записи, включая запрещённые. Нужно ВЫБРАТЬ РАЗРЕШЕННЫЕ."}, {"sec": 7, "q": "При работе с временными таблицами менеджер временных таблиц:", "opts": ["создается в единственном экземпляре на информационную базу, попытка повторного создания приводит к исключительной ситуации", "может быть создан по одному экземпляру на сеанс (запуск 1С:Предприятие)", "в рамках одного сеанса может быть создано произвольное количество экземпляров", "существует в единственном экземпляре, обращение к нему производится через соответствующее свойство глобального контекста"], "correct": [2], "fuzzy": false, "e": "Менеджеров временных таблиц в сеансе можно создать сколько угодно — каждый хранит свой набор временных таблиц, время их жизни = время жизни менеджера."}, {"sec": 7, "q": "При соединении таблиц-источников данных в конструкторе запросов можно:", "opts": ["Назначить соединение без указания условия связи", "Назначить соединение с указанием условия связи, причем это условие может быть только одно", "Назначить соединение с указанием условия связи, причем это условие может быть только простое", "Назначить необходимое количество соединений с указанием необходимого количества условий связи, причем эти условия могут быть как простые, так и произвольные"], "correct": [3], "fuzzy": false, "e": "Соединений и условий связи — сколько нужно; условия могут быть и простыми (поле=поле), и произвольными выражениями."}, {"sec": 7, "q": "При создании временной таблицы, после ключевого слова \"Поместить\" указывается имя временной таблицы. Это имя должно быть:", "opts": ["уникальным в пределах информационной базы", "уникальным в пределах пользовательского сеанса", "уникальным в пределах менеджера временных таблиц, пакетного запроса", "может совпадать с именем существующей временной таблицы, в этом случае произойдет замещение данных в ранее существовавшей таблице"], "correct": [2], "fuzzy": false, "e": "Имя временной таблицы после ПОМЕСТИТЬ должно быть уникальным в пределах менеджера временных таблиц / пакетного запроса."}, {"sec": 7, "q": "При создании запросов, участвующих в объединении, с помощью конструктора запросов обязательно ли у всех запросов должно быть одинаковое количество полей в списке выборки?", "opts": ["Да. Поля р ЧЕТОВ (свойство «Максимальное количество субконто»), а не в плане видов характеристик."}, {"sec": 13, "q": "Где можно определять новые виды субконто, если для хранения их значений требуется новый справочник?", "opts": ["Только в конфигураторе при наличии необходимого справочника", "Только в конфигураторе с использованием справочника, подчиненного плану видов характеристик, используемого для хранения видов субконто", "В Конфигураторе и 1С:Предприятие с использованием справочника, подчиненного плану видов характеристик, используемого для хранения видов субконто"], "correct": [2], "fuzzy": false, "e": "Новые виды субконто создаются и в конфигураторе, и в 1С:Предприятии — если у плана видов характеристик есть подчинённый справочник для хранения значений (свойство «Дополнительные значения характеристик»)."}, {"sec": 13, "q": "Где определяются варианты признаков учета субконто?", "opts": ["В плане видов характеристик", "В плане счетов", "В регистре бухгалтерии"], "correct": [1], "fuzzy": false, "e": "Признаки учёта субконто (количественный, суммовой, валютный…) определяются в ПЛАНЕ СЧЕТОВ — рядом с максимальным количеством субконто."}, {"sec": 13, "q": "Для хранения информации о возможной дополнительной аналитике по счетам бухгалтерского учета (субконто) в конфигурации используются:", "opts": ["Перечисления", "Справочники", "Документы", "Планы видов характеристик", "Регистры сведений"], "correct": [3], "fuzzy": false, "e": "Виды субконто (аналитика счетов) хранятся в планах видов характеристик — план счетов ссылается на ПВХ свойством «Виды субконто»."}, {"sec": 13, "q": "Для чего предназначен порядок кода?", "opts": ["Для произвольного упорядочивания счетов", "Для представления кода счета", "Для хранения произвольного кода счета"], "correct": [0], "fuzzy": false, "e": "«Порядок кода» у плана счетов — служебное строковое поле для произвольного упорядочивания счетов в списках (сортировка «60.10» после «60.9» и т.п.)."}, {"sec": 13, "q": "Запись регистра бухгалтерии без подд ц\", периодичность предопределена платформой", "Можно определить из списка предлагаемых вариантов"], "correct": [1], "fuzzy": false, "e": "Периодичность ХРАНЕНИЯ итогов регистра бухгалтерии не настраивается — всегда «Месяц». А вот ПОЛУЧАТЬ итоги можно с разной периодичностью из списка (день, неделя…). Пара вопросов хранение/получение! ~"}, {"sec": 13, "q": "Когда возможно использование корреспонденции?", "opts": ["Если в плане счетов включен признак учета \"Корреспонденция\"", "Если для регистра бухгалтерии выбран план счетов", "Если для регистра бухгалтерии включено использование корреспонденции, и наличие плана счетов не важно", "Если одновременно выбран план счетов и у регистра бухгалтерии включено использование корреспонденции"], "correct": [3], "fuzzy": false, "e": "Корреспонденция включается двумя условиями сразу: выбран план счетов И у регистра установлен флаг «Корреспонденция»."}, {"sec": 13, "q": "Может ли маска кода счета иметь следующий вид: ###.##.#.#?", "opts": ["Может", "Не может, так как порядок счета задается с помощью символа @", "Не может, так как счет может иметь только 3 уровня субсчетов", "Верны ответы 2 и 3"], "correct": [0], "fuzzy": false, "e": "Может: маска кода — произвольная комбинация допустимых символов и разделителей, ###.##.#.# — легальный шаблон."}, {"sec": 13, "q": "Может ли пользователь в режиме 1С:Предприятие создать новый план счетов?", "opts": ["Может", "Не может", "Может, только если у него не ограничены соответствующие права"], "correct": [1], "fuzzy": false, "e": "Новый план счетов — только в конфигураторе. Пользователь может добавлять СЧЕТА в существующий план, но не сам план."}, {"sec": 13, "q": "На закладке \"Данные\" одного из Планов счетов добавляем новый признак учета, затем обновляем конфигурацию базы данных. Необходимо ли перепроведение документов или ручного изменения движений для обеспечения возможности обращения к итогам по ранее введенным операциям?", "opts": ["Необходимо, так как в регистрах бухгалтерии появятся незаполненные сведения, что приведет к ошибкам при формировании отчетов", "Необходимо, но только по регистрам, где используется данный План счетов", "Нет такой необходимости"], "correct": [2], "fuzzy": false, "e": "Добавление нового признака учёта не требует перепроведения документов: признак — это колонка-флажок, старые итоги остаются корректными."}, {"sec": 13, "q": "По какому реквизиту осуществляется контроль уникальности в плане счетов?", "opts": ["По коду", "По порядку кода", "По наименованиям", "Верны варианты 1 и 2", "Верны все варианты"], "correct": [0], "fuzzy": false, "e": "Уникальность счетов контролируется по КОДУ (в отличие от справочников, где выбор код/наименование настраивается)."}, {"sec": 13, "q": "Почему в карточке счета в табличной части система может не отображать новый признак учета субконто в конфигураторе?", "opts": ["Не сохранили конфигурацию", "Не обновили конфигурацию базы данных", "Не выбрали максимальное количество субконто", "Не выбрали виды субконто", "Верны варианты 1 и 2"], "correct": [2], "fuzzy": false, "e": "Признак учёта СУБКОНТО не виден в карточке счёта, если не задано максимальное количество субконто — без него нет и табличной части «Виды субконто»."}, {"sec": 13, "q": "Почему в плане счетов может быть недоступно изменение максимального количества субконто?", "opts": ["Не выбран план видов характеристик", "План видов характеристик не подчинен плану счетов", "В регистре бухгалтерии не указан план счетов", "Не указано использование корреспонденции"], "correct": [0], "fuzzy": false, "e": "Максимальное количество субконто заблокировано, пока не выбран план видов характеристик в свойстве «Виды субконто»."}, {"sec": 13, "q": "Почему в списке стандартных реквизитов регистра бухгалтерии может отсутствовать реквизит \"ВидСубконто1\" и \"Субконто1\"?", "opts": ["Не выбран план счетов", "У плана счетов нет субконто", "У плана счетов не указано максимальное количество субконто", "Верны варианты 2 и 3", "Верны варианты 1 и 2", "Верны все варианты"], "correct": [5], "fuzzy": false, "e": "Нет реквизитов ВидСубконто1/Субконто1 — значит: не выбран план счетов, или у него не задано максимальное количество субконто, или нет видов субконто. Все варианты."}, {"sec": 13, "q": "Почему может быть не активна кнопка \"Добавить\" для табличной части \"Виды субконто\" в конфигураторе?", "opts": ["Не указано количество видов субконто", "Количество записей табличной части достигло максимального значения", "Элемент плана счетов является предопределенным", "Верны варианты 1 и 2", "Верны все варианты"], "correct": [3], "fuzzy": false, "e": "Кнопка «Добавить» видов субконто неактивна: не указано максимальное количество субконто ИЛИ достигнут его предел."}, {"sec": 13, "q": "Признак учета счета ограничивает?", "opts": ["Ввод данных в регистре бухгалтерии по выбранному счету", "Получение развернутой информации по счету", "Редактирование счета в режиме 1С:Предприятие"], "correct": [0], "fuzzy": false, "e": "Признак учёта счёта ограничивает ввод данных в регистре бухгалтерии по этому счёту: снят «валютный» — валютная сумма по счёту не вводится."}, {"sec": 13, "q": "С какой периодичностью можно получать итоговые данных для регистров бухгалтерии?", "opts": ["Произвольную", "Только \"Месяц\", периодичность предопределена платформой", "Можно определить из списка предлагаемых вариантов"], "correct": [2], "fuzzy": false, "e": "ПОЛУЧАТЬ итоги можно с периодичностью из предлагаемого списка (регистратор, день, месяц…) — виртуальные таблицы посчитают. Хранится же всё помесячно."}, {"sec": 13, "q": "Сколько в платформе предопределенных признаков учета субконто?", "opts": ["В платформе нет предопределенных признаков учета, они задаются только в процессе разработки конфигурации", "Всегда существует один предопределенный признак учета \"Только обороты\"", "Наличие предопределенного признака учета зависит от корреспонденции", "Наличие предопределенного признака учета зависит от использования признаков учета счета"], "correct": [1], "fuzzy": false, "e": "Предопределённый признак учёта субконто один — «Только обороты» (остатки по субконто не хранить). Остальные признаки создаёт разработчик."}, {"sec": 13, "q": "Сколько уровней субсчетов можно задать в конфигурации?", "opts": ["У счета заложено 3 уровня субсчетов, и изменить это нельзя", "Количество уровней субсчетов не ограничено", "Возможности платформы 1С:Предприятие позволяют использовать до 10 уровней субсчетов", "Возможности платформы 1С:Предприятие позволяют использовать до 5 уровней субсчетов"], "correct": [1], "fuzzy": false, "e": "Глубина субсчетов не ограничена — субсчёт субсчёта сколько угодно раз."}, {"sec": 13, "q": "Существуют ли ограничения по количеству записей в наборе регистра бухгалтерии?", "opts": ["Ограничений не существует", "Ограничения только в учебной версии платформы", "Максимальное число записей в наборе 999999999"], "correct": [2], "fuzzy": false, "e": "Лимит набора записей регистра бухгалтерии — 999 999 999 записей (девять девяток): столько строк влезает в один регистратор."}, {"sec": 13, "q": "Чем может определяться представление счета?", "opts": ["Именем счета", "Кодом счета", "Наименованием счета", "Порядком кода", "Верны варианты 2 и 3", "Верны варианты 2, 3 и 4"], "correct": [4], "fuzzy": false, "e": "Представление счёта определяется кодом или наименованием — выбирается в свойствах плана счетов (свойство «Основное представление»)."}, {"sec": 13, "q": "Чем отличаются небалансовые ресурсы регистра бухгалтерии с поддержкой корреспонденции от балансовых?", "opts": ["Различий нет (предполагается, что по таким ресурсам не строится регламентированная отчетность)", "По небалансовым ресурсам не поддерживается равенство сумм по дебету и кредиту по регистру для балансовых счетов", "По небалансовым ресурсам нельзя получать текущие остатки (сальдо)", "Верны ответы 2 и 3"], "correct": [1], "fuzzy": false, "e": "Небалансовый ресурс: НЕ требуется равенство сумм по дебету и кредиту (количество, валютная сумма). Балансовый (Сумма) — Дт в Я конфигурации — требований нет. Пара-контраст!"}, {"sec": 13, "q": "Что определяет маска кода?", "opts": ["Шаблон определения кода счета", "Шаблон определения порядка кода", "Структуру иерархии в плане счетов", "Верны варианты 1 и 2"], "correct": [0], "fuzzy": false, "e": "Маска кода — шаблон, по которому вводится и контролируется код счёта (структура, разделители, допустимые символы)."}, {"sec": 14, "q": "Базовые планы видов расчета - это:", "opts": ["планы видов расчета, с которыми связаны регистры расчета", "те планы видов расчета, из которых будут браться виды расчета для вычисления расчетной базы", "те планы видов расчета, у которых свойство \"зависимость от базы\" установлено в значение, отличное от \"не зависит\""], "correct": [1], "fuzzy": false, "e": "Базовые ПВР — те планы, ИЗ которых берутся виды расчета для вычисления расчетной базы текущего плана. Не путай: «зависимость от базы» — свойство самого плана, а базовые планы — источники."}, {"sec": 14, "q": "Базовый период – это...", "opts": ["понятие, определяемое свойствами БазовыйПериодНачало и БазовыйПериодКонец, в котором лежат записи регистра расчета, входящие в состав расчетной базы текущей записи регистра расчета. Базовый период всегда приводится к началу периода и является датой, которая может не совпадать со значением свойства БазовыйПериодНачало", "интервал дат, определяемый свойствами БазовыйПериодНачало и БазовыйПериодКонец, в котором лежат записи регистра расчета, входящие в состав расчетной базы текущей записи регистра расчета", "период, который принимает дискретные значения в зависимости от периодичности регистра расчета"], "correct": [1], "fuzzy": false, "e": "Базовый период — интервал дат (БазовыйПериодНачало…БазовыйПериодКонец), в котором лежат записи, входящие в расчетную базу текущей записи. Ничего про «приведение к началу» — это ловушка из длинного варианта."}, {"sec": 14, "q": "Базовый период:", "opts": ["всегда кратен периоду регистра расчета", "может быть не кратен периоду регистра расчета", "всегда лежит в одном периоде регистра расчета"], "correct": [1], "fuzzy": false, "e": "Базовый период задаётся произвольными датами и может быть НЕ кратен периоду регистра расчета (например, база за произвольные три недели при месячном регистре)."}, {"sec": 14, "q": "В качестве базовых регистров (из ресурсов которых рассчитывается база):", "opts": ["могут выступать несколько регистров расчета", "может выступать только один регистр расчета", "могут выступать регистры расчета, которые связаны с планами видов расчета, являющимися базовыми для плана видов расчета, с которым связан рассматриваемый регистр расчета", "верны утверждения 1, 3"], "correct": [2], "fuzzy": false, "e": "Базовые регистры — это регистры расчета, связанные с планами видов расчета, которые указаны базовыми для плана текущего регистра. Формулировка длинная, но именно она полная и верная (простое «несколько регистров» — неполно)."}, {"sec": 14, "q": "В качестве ведущих можно указать...", "opts": ["виды расчета из нескольких планов видов расчета", "виды расчета из одного плана видов расчета", "оба утверждения верны"], "correct": [2], "fuzzy": false, "e": "Ведущие виды расчета можно брать и из одного, и из нескольких планов видов расчета — поэтому верный ответ «оба утверждения верны»."}, {"sec": 14, "q": "В качестве регистратора у регистра расчета может выступать:", "opts": ["справочник", "план видов расчета", "документ", "любой объект", "только план видов расчета или документ"], "correct": [2], "fuzzy": false, "e": "Регистратор у любого регистра (в т.ч. расчета) — только ДОКУМЕНТ."}, {"sec": 14, "q": "В окне свойств измерений \"Перерасчета\" в группе \"Связь\" в свойстве \"Измерение регистра\" указывается:", "opts": ["измерение базового регистра, при изменении данных которого следует пересчитать текущую запись регистра", "измерение текущего регистра, записи с которым следует пересчитать при изменении данных базовых регистров", "измерения базовых регистров, при изменении данных которых следует пересчитать текущую запись регистра"], "correct": [1], "fuzzy": false, "e": "«Измерение регистра» в перерасчете — измерение ТЕКУЩЕГО регистра расчета: по нему определяются записи, которые надо пересчитать, когда меняются данные базовых регистров."}, {"sec": 14, "q": "Ведущие виды расчета - это ...", "opts": ["виды расчета, при вводе (или изменении) которых результат текущего вида расчета должен быть пересчитан", "которые взаимно исключают друг друга по периоду действия и система должна гарантировать, что ввод одного из них приведет к исключению другого", "виды расчета, при удалении которых запись с текущим видом расчета будет автоматически удалена"], "correct": [0], "fuzzy": false, "e": "Ведущие — виды расчета, при вводе/изменении которых нужно ПЕРЕСЧИТАТЬ результат текущего вида (Оклад — ведущий для ПремииПроцентом). Вытеснение — про период действия, не путай."}, {"sec": 14, "q": "Виды расчета - это ...", "opts": ["объекты базы данных", "объекты конфигурации", "объекты встроенного языка"], "correct": [0], "fuzzy": false, "e": "План видов расчета — объект конфигурации, а сами виды расчета (его элементы) — объекты БАЗЫ ДАННЫХ (их можно создавать и в Предприятии)."}, {"sec": 14, "q": "Выберите правильный ответ:", "opts": ["Регистр расчета может быть связан с несколькими планами видов расчета", "Регистр расчета может быть связан только с одним планом видов расчета", "Регистр расчета может быть связан только с тремя планами видов расчета"], "correct": [1], "fuzzy": false, "e": "Связь регистра расчета с ПВР: регистр расчета связан только с ОДНИМ планом видов расчета (обратное неверно; а вот план может обслуживать несколько регистров)."}, {"sec": 14, "q": "Выберите правильный ответ:", "opts": ["Регистр расчета может быть связан с несколькими планами видов расчета", "Регистр расчета может быть связан только с одним планом видов расчета", "Регистр расчета может быть связан только с тремя планами видов расчета"], "correct": [1], "fuzzy": true, "e": "Связь регистра расчета с ", "непериодический регистр сведений", "подчиненный справочник"], "correct": [1], "fuzzy": false, "e": "График регистра расчета — это НЕПЕРИОДИЧЕСКИЙ регистр сведений (измерения: график+дата, ресурс — число). Объекта «календарь» в платформе нет."}, {"sec": 14, "q": "Для того, чтобы записи регистра расчета попадали в базовый период по периоду регистрации:", "opts": ["в плане видов расчета, связанном с регистром расчета, должен быть установлен признак зависимости от базы \"Зависит по периоду регистрации\"", "в плане видов расчета, связанном с регистром расчета, может быть установлен любой признак зависимости от базы, записи регистра расчета всегда будут попадать в базовый период по периоду регистрации", "в регистре расчета должен быть установлен признак \"Период регистрации\""], "correct": [0], "fuzzy": false, "e": "Попадание в базу по периоду регистрации — это настройка ПЛАНА видов расчета: зависимость от базы = «Зависит по периоду регистрации»."}, {"sec": 14, "q": "Если задать в плане видов расчета, что \"Отпуск\" вытесняет \"Оклад\", и, в тоже время, что \"Оклад\" вытесняет \"Отпуск\", и попытаться сохранить изменения, то:", "opts": ["система выдаст предупреждение и не станет сохранять изменения", "возникнет ошибка системы", "все сохранится"], "correct": [0], "fuzzy": false, "e": "Взаимное вытеснение (А вытесняет Б и Б вытесняет А) система не допустит: выдаст предупреждение и НЕ сохранит изменения. Не «ошибка системы», а штатный контроль."}, {"sec": 14, "q": "Если одним документом рассчитываются зависимые по базе записи (например, Оклад и ПремияПроцентом, в состав базы которой попадает оклад), то:", "opts": ["прежде, чем рассчитать зависимую от базы запись, нужно рассчитать запись, попадающую в эту базу и записать результат в регистр расчета. Таким образом, в общем случае в процессе проведения документа будет произведено две процедуры записи в регистр расчета", "последовательность расчета таких записей может быть произвольной, поскольку система автоматически определит последовательность расчета в зависимости от уровня приоритета видов расчета. В процессе проведения документа будет произведена одна процедура записи в регистр расчета", "прежде, чем рассчитать зависимую от базы запись, нужно рассчитать запись, попадающую в эту базу. В процессе проведения документа будет произведена одна процедура записи в регистр расчета"], "correct": [0], "fuzzy": false, "e": "Зависимую по базе запись можно считать только после того, как влияющая запись УЖЕ ЗАПИСАНА в регистр (база читается из БД запросом). Итого: две процедуры записи в регистр за одно проведение."}, {"sec": 14, "q": "Если регистр расчета поддерживает период действия, то:", "opts": ["ему обязательно должен быть указан график", "ему не обязательно должен быть указан график", "в плане видов расчета, связанном с регистром расчета должен быть установлен признак \"Использует период действия\"", "верны 1 и 3 утверждения"], "correct": [2], "fuzzy": false, "e": "Флаг «Период действия» у регистра требует, чтобы у связанного ПЛАНА видов расчета стоял признак «Использует период действия». График при этом указывать НЕ обязательно (он нужен для данных графика, а не для самого периода)."}, {"sec": 14, "q": "Если установлена зависимость базы по периоду действия, то:", "opts": ["может произойти частичное попадание записей регистра расчета в базовый период", "\"частичных\" результатов не будет: или запись будет целиком учтена, или целиком не учтена", "может произойти частичное попадание записей регистра расчета в базовый период, причем база будет рассчитана пропорционально тому, какую часть от фактического периода влияющей записи составляет перекрывающийся, с указанным базовым периодом, участок. При этом будут использованы данные графика, связанного с этой записью", "верны 1 и 3 утверждения"], "correct": [2], "fuzzy": false, "e": "При зависимости по периоду действия возможны ЧАСТИЧНЫЕ попадания: база берётся пропорционально перекрытию фактического периода записи с базовым периодом, по данным графика. Полный (длинный) вариант — верный."}, {"sec": 14, "q": "Зависимость от базы как \"Зависимость по периоду действия\" в плане видов расчета устанавливается, если...", "opts": ["предполагается, что хотя бы один вид расчета в плане будет обладать протяженностью во времени", "предполагается, что в дальнейшем при определении расчетной базы для записи регистра расчета будут учитываться только те записи, у которых фактический период действия попадает в базовый период", "предполагается, что все виды расчета в плане будут обладать протяженностью во времени"], "correct": [1], "fuzzy": false, "e": "«По периоду действия» = в базу попадут записи, чей ФАКТИЧЕСКИЙ период действия попадает в базовый период. Вопрос-близнец про «по периоду регистрации» — там критерий попадания — ПериодРегистрации."}, {"sec": 14, "q": "Зависимость от базы как \"Зависимость по периоду регистрации\" в плане видов расчета устанавливается, если...", "opts": ["предполагается, что в дальнейшем при определении расчетной базы для записи регистра расчета будут учитываться только те записи, у которых Период регистрации попадает в базовый период", "предполагается, что ни один вид расчета в плане не будет обладать свойством действовать какой-то период времени", "предполагается, что в регистре расчета, связанном с данным планом видов расчета, все виды расчета не будут обладать свойством действовать какой-то период времени"], "correct": [0], "fuzzy": false, "e": "«По периоду регистрации» = в базу попадут записи, у которых ПЕРИОД РЕГИСТРАЦИИ лежит в базовом периоде. Сравни с двойником про период действия — там фактический период действия."}, {"sec": 14, "q": "Значение свойства ПериодДействия:", "opts": ["всегда совпадает со значением свойства ПериодДействияКонец", "всегда совпадает со значением свойства ПериодДействияНачало", "всегда приводится к началу периода, соответствующего значению свойства ПериодДействияНачало, и может не совпадать со значением свойства ПериодДействияНачало"], "correct": [2], "fuzzy": false, "e": "ПериодДействия — служебное значение: ПериодДействияНачало, приведённый к НАЧАЛУ периода регистра, поэтому может не совпадать с самим ПериодДействияНачало."}, {"sec": 14, "q": "Каково соотношение планов видов расчета и регистров расчета?", "opts": ["Один план видов расчета соответствует одному регистру расчета", "Несколько регистров расчета могут быть привязаны к одному плану видов расчета", "Несколько планов видов расчета могут быть привязаны к одному регистру расчета", "Регистр расчета может быть привязан к нескольким планам видов расчета, а план видов расчета - к нескольким регистрам расчета"], "correct": [1], "fuzzy": false, "e": "Один ПВР — много регистров расчета: несколько регистров могут ссылаться на один план, но каждый регистр связан ровно с одним планом."}, {"sec": 14, "q": "Метод ПолучитьДополнение() набора записей регистра расчета используется:", "opts": ["если текущим периодом нужно ввести запись, чтобы она \"вытеснила\" запись прошлого периода", "для получения дополнения к текущему набору записей в виде таблицы значений со структурой, повторяющей структуру набора записей", "все утверждения верны"], "correct": [2], "fuzzy": false, "e": "ПолучитьДополнение() возвращает таблицу значений со сторно-записями (структура повторяет набор записей) — нужен, когда запись текущего периода должна «вытеснить» запись прошлого периода. Оба назначения верны → ответ «все утверждения верны»."}, {"sec": 14, "q": "Механизм вытеснения проявляется:", "opts": ["в изменении таблицы регистра расчета", "в изменении состава записей таблицы Фактического периода действия", "в том, что при вводе движений одними документами производится необратимое искажение движений других документов", "все утверждения верны"], "correct": [1], "fuzzy": false, "e": "Вытеснение НЕ меняет саму таблицу регистра — оно меняет состав таблицы ФАКТИЧЕСКОГО ПЕРИОДА ДЕЙСТВИЯ. Движения других документов не искажаются."}, {"sec": 14, "q": "Новые виды расчета:", "opts": ["можно создавать только в режиме \"1С:Предприятие\"", "можно создавать только в режиме \"Конфигуратор\"", "можно создавать в режиме \"1С:Предприятие\" и в режиме \"Конфигуратор\""], "correct": [2], "fuzzy": false, "e": "Виды расчета — данные, а не метаданные: создаются и в Конфигураторе (предопределённые), и в 1С:Предприятии (пользовательские)."}, {"sec": 14, "q": "Отсутствие предопределенной табличной части \"Базовые виды расчета\" у видов расчета Плана видов расчета можно объяснить тем, что:", "opts": ["в конфигурации задано несколько Планов видов расчета и в качестве базовых можно указать виды расчета из других планов видов расчета", "в регистре расчета не установлен признак \"базовый период\"", "зависимость от базы в плане видов расчета не определена", "верны 1 и 3 ответы"], "correct": [2], "fuzzy": false, "e": "Табличная часть «Базовые виды расчета» появляется только если у плана видов расчета задана зависимость от базы. Не определена зависимость — нет табличной части."}, {"sec": 14, "q": "Период действия записи (задаваемый датой начала и датой окончания):", "opts": ["может не совпадать с фактическим периодом действия", "всегда совпадает с фактическим периодом действия", "никогда не совпадает с фактическим периодом действия"], "correct": [0], "fuzzy": false, "e": "Период действия — «плановый» интервал; фактический период действия получается после вытеснений и может отличаться (совпадёт, только если ничего не вытеснено)."}, {"sec": 14, "q": "Планы видов расчета предназначены...", "opts": ["для описания множеств возможных видов расчета", "для накопления информации о периодических расчетах", "для хранения информации о перерасчетах", "верно все вышеперечисленное", "верны утверждения 1 и 3"], "correct": [0], "fuzzy": false, "e": "ПВР описывает МНОЖЕСТВО возможных видов расчета (аналог плана видов характеристик). Накопление расчетов — задача регистра расчета, перерасчеты — таблиц перерасчета."}, {"sec": 14, "q": "Понятие вытесняющие виды расчетов теряет смысл, если ...", "opts": ["период действия uzzy": false, "e": "Один регистр сведений-график хранит СКОЛЬКО УГОДНО графиков — они различаются значением измерения «график» (пятидневка, шестидневка…)."}, {"sec": 14, "q": "Регистры расчета служат:", "opts": ["для накопления информации о периодических расчетах", "для описания множеств однотипных видов расчета", "для хранения сведений о перерасчетах"], "correct": [0], "fuzzy": false, "e": "Регистр расчета — для НАКОПЛЕНИЯ информации о периодических расчетах. Описание множества видов — это ПВР, перерасчеты — отдельные таблицы. Тройка «регистр/план/перерасчет» часто тасуется по вопросам."}, {"sec": 14, "q": "Ресурс у регистра расчета может иметь тип...", "opts": ["любой (как у реквизита)", "только ссылочный", "только логический и числовой", "только числовой"], "correct": [3], "fuzzy": false, "e": "Ресурс регистра расчета — ТОЛЬКО число (как и у регистра накопления). Ссылочные и прочие типы — в реквизиты и измерения."}, {"sec": 14, "q": "Свойства записи регистра расчета БазовыйПериодНачало, БазовыйПериодОкончание доступны только в том случае, когда:", "opts": ["установлен флажок \"базовый период\" в свойствах регистра расчета", "признак \"зависимость от базы\" в свойствах плана видов расчета, с которым связан регистр расчета, установлен в положение, отличное от \"не зависит\"", "признак \"зависимость от базы\" в свойствах плана видов расчета, с которым связан регистр расчета, установлен в положение, отличное от \"не зависит\" и установлен флажок \"период действия\" в свойствах регистра расчета"], "correct": [0], "fuzzy": false, "e": "БазовыйПериодНачало/Окончание появляются, когда у самого РЕГИСТРА расчета установлен флажок «Базовый период». Варианты про план видов расчета — отвлекающие."}, {"sec": 14, "q": "Свойство \"использует период действия\" в плане видов расчета устанавливается, если...", "opts": ["предполагается, что все виды расчета в плане будут обладать протяженностью во времени", "предполагается, что хотя бы один вид расчета в плане будет обладать протяженностью во времени", "предполагается, что в регистре расчета, связанном с данным планом видов расчета, все записи будут обладать протяженностью во времени", "Верно утверждение 2 и 3"], "correct": [2], "fuzzy": false, "e": "Флаг «Использует период действия» у плана означает: ВСЕ записи связанного регистра расчета будут протяжёнными во времени (период действия — свойство регистра целиком, а не отдельных видов). Формально верный вариант — про «все записи регистра». ~"}, {"sec": 14, "q": "Свойство записи регистра расчета ПериодРегистрации – это...", "opts": ["период, который принимает дискретные значения в зависимости от периодичности регистра расчета", "дата, которая принимает дискретные значения в зависимости от периодичности регистра расчета", "нет правильных ответов"], "correct": [1], "fuzzy": false, "e": "ПериодРегистрации — это ДАТА (не «период»), принимающая дискретные значения по периодичности регистра (первое число месяца при месячной периодичности). Ловушка в слове «период» vs «дата»."}, {"sec": 14, "q": "Таблица \"Перерасчета\" заполняется строками, каждая из которых представляет собой:", "opts": ["набор сведений о виде расчета и документе-регистраторе записи регистра расчета, которую нужно пересчитать. Также в таблице будут присутствовать измерения перерасчета", "набор сведений о виде расчета и документе-регистраторе записи регистра расчета, которую нужно пересчитать", "набор сведений о виде расчета, номере строки документа-регистратора и самом регистраторе записи регистра расчета, которую нужно пересчитать. Также в таблице будут присутствовать измерения перерасчета", "нет правильных ответов"], "correct": [0], "fuzzy": false, "e": "Строка перерасчета = вид расчета + документ-регистратор пересчитываемой записи + значения ИЗМЕРЕНИЙ перерасчета. Вариант без измерений — неполный, вариант с «номером строки» — выдумка."}, {"sec": 14, "q": "У предопределенного вида расчета пользователь не может...", "opts": ["изменить код", "изменить наименование", "изменить наимен const Q = DATA.questions, SEC = DATA.sections;
const bySec = {};
Q.forEach((q,i)=>{ (bySec[q.sec]=bySec[q.sec]||[]).push(i); });

  Q.length + ' вопросов, ' + Object.keys(bySec).length + ' разделов' +
  '<br><span style="font-size:12px;color:#888">Раздел 9 «Система взаимодействия» отсутствует в ключе 2014 г. — ответы для него подобраны ИИ (помечены ⚠).</span>';
const sel = document.getElementById('secSel');
sel.innerHTML = '<option value="all">Весь банк ('+Q.length+')</option>' +

   '<option value="'+s+'">'+s+'. '+SEC[s]+' ('+bySec[s].length+')</option>').join('');

let mode, list, pos, right, wrong, results, deadline, tick, snaps, frontier;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// «комбо»-варианты: «верны 1 и 3», «все утверждения верны», «нет правильного ответа»…
const COMBO_RE = /^\s*(верн[ыоа]?[\s,]|нет\s+(правильн|верн)|(все|всё)\s+(вышеперечисленн|перечисленн|варианты|ответы|утверждени|значени)|(оба|обе)\s+(утвержден|ответ|вариант|высказыван)|любым?\s+из|одновременно\s+(должны|включ)|включен[а-яё]*\s+вариант|варианты?\s*\d|правильн[а-яё]*\s+(ответ|вариант)|допустим[а-яё]*\s+вариант|справедливо\s+все|возможны\s+оба)/i;
// комбо ссылается на позиции? (цифры или порядковые слова)
const POS_RE = /\d|перв|втор|треть|четверт|пят/i;
function orderOpts(q){
  const combo=[], plain=[];
  q.opts.forEach((o,i)=> (COMBO_RE.test(o)?combo:plain).push(i));
  if(!combo.length) return shuffle(plain);
  const positional = combo.some(i=>POS_RE.test(q.opts[i]));
  // если комбо ссылается на номера — порядок обычных вариантов не трогаем,
  // иначе перемешиваем; комбо всегда в конце, в исходном порядке (1и2 раньше 1и3)
  return (positional?plain:shuffle(plain)).concat(combo);
}

function startExam(){
  const b=document.querySelector('#resultCard .btn-r');
  b.textContent='Новый билет'; b.onclick=startExam; b.style.display='';
  mode='exam'; list=[];
  const secs = shuffle(Object.keys(bySec)).slice(0,14);
  secs.forEach(s=> list.push(bySec[s][Math.floor(Math.random()*bySec[s].length)]));
  while(list.length<14){ // если разделов меньше 14 — добираем случайными
    const r=Math.floor(Math.random()*Q.length);
    if(!list.includes(r)) list.push(r);
  }
  shuffle(list);
  results = new Array(list.length).fill(null);
  begin();
  deadline = Date.now()+30*60*1000;
  const t=document.getElementById('timer'); t.style.display='block';
  tick = setInterval(()=>{
    let ms = deadline-Date.now();
    if(ms<=0){ clearInterval(tick); finishExam(true); return; }
    const m=Math.floor(ms/60000), s=Math.floor(ms/1000)%60;
    t.textContent = m+':'+String(s).padStart(2,'0');
    t.classList.toggle('warn', ms<5*60*1000);
  },250);
}

let roundRight, roundNum, rounds;
function startLearn(){
  mode='learn';
  const v = sel.value;
  rounds = null;
  if(v==='all'){
    // серии-«билеты»: в каждой серии разделы не повторяются
    const pool = {};
    Object.keys(bySec).forEach(s=> pool[s]=shuffle(bySec[s].slice()));
    list=[]; rounds=[];
    while(true){
      const avail = shuffle(Object.keys(pool).filter(s=>pool[s].length));
      if(!avail.length) break;
      const start=list.length;
      avail.forEach(s=> list.push(pool[s].pop()));
      rounds.push({start, size:list.length-start});
    }
  } else {
    list = bySec[v].slice();
    if(document.getElementById('shuf').checked) shuffle(list);
  }
  results = new Array(list.length).fill(null);
  roundRight=0; roundNum=1;
  document.getElementById('timer').style.display='none';
  begin();
}
function roundInfo(){
  if(!rounds) return null;
  const r = rounds[roundNum-1];
  return {startIdx:r.start, size:r.size};
}

function begin(){
  pos=0; right=0; wrong=0;
  snaps=new Array(list.length).fill(null); frontier=0;
  document.getElementById('menu').style.display='none';
  document.getElementById('resultCard').style.display='none';
  document.getElementById('quiz').style.display='block';
  render();
}

let curOrder, curCorrectSet, answered;
function render(){
  const qi = list[pos], q = Q[qi];
  answered=false;
  const ri = mode==='learn' ? roundInfo() : null;
  document.getElementById('qmeta').innerHTML =
    (ri? 'Серия '+roundNum+' ('+ri.size+' разделов) · вопрос '+(pos-ri.startIdx+1)+' из '+ri.size+' · счёт серии: '+roundRight :
     'Вопрос '+(pos+1)+' из '+list.length)+' · Раздел '+q.sec+'. '+SEC[q.sec]+
    (q.fuzzy?' <span class="fuzzy">~ автосверка</span>':'') +
    (q.ai?' <span class="fuzzy">⚠ ответ подобран ИИ</span>':'') +
    (q.img?' <span class="fuzzy">🖼 рисунок в книге — сверься с изданием</span>':'') +
    (q.correct.length>1?' <span class="badge">несколько ответов</span>':'');
  document.getElementById('qtext').textContent = q.q;
  frontier = Math.max(frontier, pos);
  if(!snaps[pos]) snaps[pos] = {order: orderOpts(q), chosen: null};
  curOrder = snaps[pos].order;
  curCorrectSet = new Set(q.correct);
  const multi = q.correct.length>1;
  const box = document.getElementById('opts'); box.innerHTML='';
  curOrder.forEach(oi=>{
    const d=document.createElement('label');
    d.className='opt'; d.dataset.oi=oi;
    d.innerHTML='<input type="'+(multi?'checkbox':'radio')+'" name="o"><span>'+esc(q.opts[oi])+'</span>';
    if(!multi) d.querySelector('input').addEventListener('change',()=>commitSingle(oi));
    box.appendChild(d);
  });
  document.getElementById('answerBtn').style.display = multi?'inline-block':'none';
  document.getElementById('answerBtn').disabled=false;
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('refbox').style.display='none';
  document.getElementById('refBtn').style.display='none';
  if(snaps[pos].chosen) replay(new Set(snaps[pos].chosen));
  document.getElementById('prevBtn').style.display = pos>lowBound() ? 'inline-block':'none';
  updScore();
  drawDots();
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function commitSingle(oi){
  if(answered) return;
  finishQ(new Set([oi]));
}
function commitMulti(){
  if(answered) return;
  const chosen=new Set();
  document.querySelectorAll('#opts .opt').forEach(el=>{
    if(el.querySelector('input').checked) chosen.add(+el.dataset.oi);
  });
  if(!chosen.size) return;
  finishQ(chosen);
}
function paintAnswered(chosen){
  document.querySelectorAll('#opts .opt').forEach(el=>{
    const oi=+el.dataset.oi;
    el.classList.add('locked');
    if(curCorrectSet.has(oi)) el.classList.add('correct');
    else if(chosen.has(oi)) el.classList.add('wrong');
    else el.classList.add('dim');
    const inp=el.querySelector('input');
    inp.disabled=true; inp.checked=chosen.has(oi);
  });
  document.getElementById('answerBtn').disabled=true;
  document.getElementById('refBtn').style.display='inline-block';
  document.getElementById('nextBtn').style.display='inline-block';
}
function replay(chosen){ // повторный показ уже отвеченного вопроса
  answered=true;
  const ok = results[pos]===true;
  paintAnswered(chosen);
  if(!ok) showRef(ok);
}
function lowBound(){
  return (mode==='learn' && rounds) ? roundInfo().startIdx : 0;
}
function prev(){
  if(pos>lowBound()){ pos--; render(); }
}
function finishQ(chosen){
  answered=true;
  const ok = chosen.size===curCorrectSet.size && [...chosen].every(x=>curCorrectSet.has(x));
  ok?right++:wrong++;
  if(mode==='learn' && ok) roundRight++;
  results[pos]=ok;
  snaps[pos].chosen=[...chosen];
  paintAnswered(chosen);
  if(!ok) showRef(ok); else refPrepared=ok;
  updScore(); drawDots();
  if(mode==='exam'){
    const done = results.filter(r=>r!==null).length;
    const wrongs = results.filter(r=>r===false).length;
    if(done===list.length || wrongs>list.length-12){ /* можно закончить досрочно при провале — но дадим дорешать */ }
  }
}
function expandCombo(q, idx){
  // если верный вариант — «Варианты 1 и 2» / «Верны все…», раскрываем его в тексты
  const t = q.opts[idx];
  if(/вс[ея] (указанн|перечисленн|вариант)/i.test(t)){
    return q.opts.filter((_,i)=>i!==idx);
  }
  const m = t.match(/(?:вариант\w*|верн\w*|правильн\w*)[^0-9]*([0-9][0-9 ,и\/или]*)/i);
  if(m){
    const nums=[...m[1].matchAll(/\d+/g)].map(x=>+x[0]-1).filter(i=>i>=0&&i<q.opts.length&&i!==idx);
    if(nums.length) return nums.map(i=>q.opts[i]);
  }
  return null;
}
let refPrepared=null;
function showRef(ok){
  const q = Q[list[pos]];
  const box = document.getElementById('refbox');
  let html='';
  if(!ok){
    html += '<b>✘ Неверно. Правильный ответ:</b>';
    q.correct.forEach(ci=>{
      html += '<div style="margin-top:6px">• '+esc(q.opts[ci])+'</div>';
      const exp = expandCombo(q, ci);
      if(exp) html += '<div style="margin:4px 0 0 14px;color:#555">то есть:'+
        exp.map(e=>'<div>– '+esc(e)+'</div>').join('')+'</div>';
    });
  }
  if(q.e){
    html += '<div style="margin-top:'+(ok?'0':'10px')+'"><b>💡 Справка:</b> '+esc(q.e)+'</div>';
  } else if(ok){
    html += '<b>💡 Справка:</b> Запомни формулировку верного варианта:';
    q.correct.forEach(ci=>{
      html += '<div style="margin-top:6px">• '+esc(q.opts[ci])+'</div>';
      const exp = expandCombo(q, ci);
      if(exp) html += '<div style="margin:4px 0 0 14px;color:#555">то есть:'+
        exp.map(e=>'<div>– '+esc(e)+'</div>').join('')+'</div>';
    });
  }
  if(q.fuzzy) html += '<div class="fuzzy" style="margin-top:6px">~ Ответ сверен с ключом автоматически — при сомнении проверьте по книге.</div>';
  if(q.ai) html += '<div class="fuzzy" style="margin-top:6px">⚠ Раздел отсутствует в ключе: ответ и справка подобраны ИИ по знанию платформы — стоит перепроверить по документации.</div>';
  box.innerHTML = html; box.style.display='block';
}
function toggleRef(){
  const box=document.getElementById('refbox');
  if(box.style.display==='none'){ showRef(results[pos]===true); }
  else box.style.display='none';
}
function next(){
  if(pos<frontier){ pos++; render(); return; }
  if(mode==='learn' && rounds){
    const ri = roundInfo();
    const lastInRound = (pos-ri.startIdx+1)===ri.size;
    if(lastInRound && pos<list.length-1){ showRound(ri); return; }
    if(lastInRound){ showLearnEnd(); return; }
  }
  if(pos<list.length-1){ pos++; render(); }
  else if(mode==='exam') finishExam(false);
  else showLearnEnd();
}
function showRound(ri){
  document.getElementById('quiz').style.display='none';
  const card=document.getElementById('resultCard'); card.style.display='block';
  const t=document.getElementById('resTitle');
  const need = Math.ceil(ri.size*12/14); // порог, пропорциональный 12 из 14
  const wouldPass = roundRight>=need;
  t.textContent = 'Серия '+roundNum+': '+roundRight+' из '+ri.size;
  t.className = 'big '+(wouldPass?'pass':'fail');
  document.getElementById('resInfo').textContent =
    (wouldPass?'В темпе «Сдано» ✔':'В темпе «Не сдано» ✘')+' (порог '+need+' из '+ri.size+', как 12 из 14).'+
    ' Всего за сессию: '+right+' верных, '+wrong+' ошибок.';
  const b=card.querySelector('.btn-r');
  const nextSize = rounds[roundNum] ? rounds[roundNum].size : 0;
  b.style.display=''; b.textContent='Следующая серия ('+nextSize+') →';
  b.onclick=()=>{ roundNum++; roundRight=0; pos++;
    card.style.display='none'; document.getElementById('quiz').style.display='block'; render(); };
}
function updScore(){
  document.getElementById('score').textContent =
    '✅ '+right+'  ❌ '+wrong + (right+wrong? '  ('+Math.round(100*right/(right+wrong))+'%)':'');
}
function drawDots(){
  const d=document.getElementById('dots');
  if(list.length>60){d.innerHTML='';return;}
  const lo=lowBound();
  d.innerHTML = list.map((_,i)=>{
    let c='dot'; if(results[i]===true)c+=' ok'; if(results[i]===false)c+=' bad'; if(i===pos)c+=' cur';
    const can = i>=lo && i<=frontier;
    return '<div class="'+c+(can?' click':'')+'"'+(can?' onclick="jump('+i+')"':'')+'>'+(i+1)+'</div>';
  }).join('');
}
function jump(i){
  if(i>=lowBound() && i<=frontier){ pos=i; render(); }
}
function finishExam(timeout){
  clearInterval(tick);
  document.getElementById('timer').style.display='none';
  document.getElementById('quiz').style.display='none';
  const card=document.getElementById('resultCard'); card.style.display='block';
  const pass = right>=12 && !((results.includes(null))&&timeout&&right<12) && right>=12;
  const t=document.getElementById('resTitle');
  t.textContent = right>=12 ? 'СДАНО ✔' : 'НЕ СДАНО ✘';
  t.className = 'big '+(right>=12?'pass':'fail');
  document.getElementById('resInfo').textContent =
    (timeout?'Время вышло. ':'')+'Верных ответов: '+right+' из '+list.length+' (порог — 12).';
}
function showLearnEnd(){
  document.getElementById('quiz').style.display='none';
  const card=document.getElementById('resultCard'); card.style.display='block';
  const t=document.getElementById('resTitle');
  t.textContent='Готово!'; t.className='big pass';
  document.getElementById('resInfo').textContent='Верно: '+right+' из '+(right+wrong)+' ('+(right+wrong?Math.round(100*right/(right+wrong)):0)+'%).';
  card.querySelector('.btn-r').style.display='none';
}
function toMenu(){
  clearInterval(tick);
  document.getElementById('timer').style.display='none';
  document.getElementById('quiz').style.display='none';
  document.getElementById('resultCard').style.display='none';
  const m=document.getElementById('menu'); m.style.display='block';
  m.parentElement.querySelectorAll('.btn-r').forEach(b=>b.style.display='');
}
</script>
